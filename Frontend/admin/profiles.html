{% extends 'admin/base.html' %}
{% block content %}
<div class="header-section">
    <h1>Edit Profile</h1>
    <p>Kelola informasi personal Anda yang akan ditampilkan di portfolio.</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data" class="admin-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" name="nama_lengkap" value="{{ profile.nama_lengkap if profile else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Nama Panggilan</label>
                    <input type="text" name="nama_panggilan" value="{{ profile.nama_panggilan if profile else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tempat Lahir</label>
                    <input type="text" name="tempat_lahir" value="{{ profile.tempat_lahir if profile else '' }}">
                </div>
                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date" name="tanggal_lahir" value="{{ profile.tanggal_lahir if profile else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ profile.email if profile else '' }}">
                </div>
                <div class="form-group">
                    <label>Telepon</label>
                    <input type="text" name="telepon" value="{{ profile.telepon if profile else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Universitas</label>
                    <input type="text" name="universitas" value="{{ profile.universitas if profile else '' }}">
                </div>
                <div class="form-group">
                    <label>Fakultas</label>
                    <input type="text" name="fakultas" value="{{ profile.fakultas if profile else '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Prodi</label>
                    <input type="text" name="prodi" value="{{ profile.prodi if profile else '' }}">
                </div>
                <div class="form-group">
                    <label>Semester</label>
                    <input type="text" name="semester" value="{{ profile.semester if profile else '' }}">
                </div>
            </div>
            <div class="form-group">
                <label>Alamat</label>
                <textarea name="alamat" rows="3">{{ profile.alamat if profile else '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Foto Profile</label>
                {% if profile and profile.foto_url %}
                    <div class="mb-3 mt-2">
                        <img src="{{ profile.foto_url }}" alt="Profile" style="max-height: 150px; border-radius: 8px; border: 2px solid #eee;">
                    </div>
                {% endif %}
                <input type="file" name="foto" accept="image/*">
                <small class="text-muted" style="display:block; margin-top:5px;">Biarkan kosong jika tidak ingin mengubah foto.</small>
            </div>
            <button type="submit" class="btn btn-primary mt-4">Simpan Profile</button>
        </form>
    </div>
</div>
{% endblock %}
