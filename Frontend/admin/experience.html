{% extends 'admin/base.html' %}
{% block content %}
<div class="header-section">
    <h1>Manage Experience</h1>
</div>

<div class="card mb-4">
    <div class="card-body">
        <h3 class="card-title">Tambah Pengalaman Baru</h3>
        <form method="POST" class="admin-form">
            <input type="hidden" name="action" value="add">
            <div class="form-row">
                <div class="form-group">
                    <label>Posisi</label>
                    <input type="text" name="posisi" required>
                </div>
                <div class="form-group">
                    <label>Perusahaan</label>
                    <input type="text" name="perusahaan" required>
                </div>
            </div>
            <div class="form-group">
                <label>Durasi (Misal: Jan 2020 - Sekarang)</label>
                <input type="text" name="durasi">
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea name="deskripsi" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-success mt-3">Tambah Experience</button>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>Posisi</th>
                    <th>Perusahaan</th>
                    <th>Durasi</th>
                    <th width="150">Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for exp in experiences %}
                <tr>
                    <td>{{ exp.posisi }}</td>
                    <td>{{ exp.perusahaan }}</td>
                    <td>{{ exp.durasi }}</td>
                    <td>
                        <form method="POST" style="display:inline;">
                            <input type="hidden" name="action" value="delete">
                            <input type="hidden" name="exp_id" value="{{ exp.id }}">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Hapus pengalaman ini?')">Hapus</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center">Belum ada data pengalaman.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
